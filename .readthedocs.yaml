version: 2

build:
  os: "ubuntu-24.04"
  tools:
    python: "3.12"
  jobs:
    post_create_environment:
      - pip install --upgrade pip
    post_install:
      - pip install -r docs/requirements.txt

python:
  install:
    - requirements: docs/requirements.txt

sphinx:
  configuration: docs/source/conf.py
