name: Build
on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build-and-test:
        runs-on: ubuntu-24.04
        steps:
            - name: Set up GCC
              uses: egor-tensin/setup-gcc@v2
              with:
                  version: latest
                  platform: x64
            - name: Install CMake
              uses: ssrobins/install-cmake@v1
              with:
                  version: 4.3.3

            - name: Checkout Project
              uses: actions/checkout@v6.0.3

            - name: Build Project
              uses: threeal/cmake-action@v2.1.0
              with:
                  build-dir: build
                  generator: Ninja
                  c-compiler: cc
                  cxx-compiler: c++
                  options: |
                      ENABLE_TESTING=ON
                      CMAKE_BUILD_TYPE=Release

            - name: Test Project
              uses: threeal/ctest-action@v1.1.0
